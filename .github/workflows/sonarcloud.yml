name: SonarCloud
on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
jobs:
  check-secrets:
    name: Check Configuration
    runs-on: ubuntu-latest
    outputs:
      has-token: ${{ steps.check.outputs.has-token }}
    steps:
      - name: Check for SONAR_TOKEN
        id: check
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "has-token=true" >> $GITHUB_OUTPUT
          else
            echo "has-token=false" >> $GITHUB_OUTPUT
          fi
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.has-token == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt pytest pytest-cov
      - name: Run tests with coverage
        run: pytest --cov-config=pyproject.toml --cov-report=xml:coverage.xml -v
        continue-on-error: true
      - name: Ensure coverage file
        run: |
          [ -f coverage.xml ] || echo '<?xml version="1.0" ?><coverage version="1.0"></coverage>' > coverage.xml
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@884b79409bbd464b2a59edc326a4b77dc56b2195
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=williaby
            -Dsonar.projectKey=williaby_zen-mcp-server
            -Dsonar.python.version=3.12
      - name: Check Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true
      - uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        if: always()
        with:
          name: coverage-sonarcloud
          path: coverage.xml
          retention-days: 7
